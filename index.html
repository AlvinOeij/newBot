<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sender</title>
</head>
<style>
  * {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }
  /* Tablet */
@media (max-width: 768px) {
  .container {
    width: 90%;
    padding: 20px;
  }

  h3 {
    font-size: 18px;
  }

  input, button {
    font-size: 14px;
    padding: 10px;
  }
}

/* HP */
/* HP */
  @media (max-width: 480px) {
    body {
      align-items: flex-start;
      padding: 20px 10px;
    }

    .container {
      width: 100%;
      padding: 20px;
      border-radius: 12px;
    }

    h3 {
      font-size: 20px; /* 🔥 diperbesar */
    }

    input {
      font-size: 16px; /* 🔥 biar kebaca */
      padding: 12px;
    }

    button {
      font-size: 16px;
      padding: 12px;
    }
  }

  input, button {
    min-height: 45px; /* biar gampang dipencet */
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: white;
  }

  .container {
    background: rgba(255, 255, 255, 0.05);
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    max-width: 700px;
    width: 90%;
    text-align: center;
  }

  h3 {
    margin-bottom: 20px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 14px;
  }

  input::placeholder {
    color: #ccc;
  }

  input:focus {
    background: rgba(255,255,255,0.2);
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: white;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  }
</style>
<body>

  <div class="container">
  <h3>Ini Buat kirim pesan ke van</h3>
  <input type="number" id="maxInput" placeholder="Mau Spam brp x?" />
  <input type="textarea" width="10" id="pesan" placeholder="Masukkan pesan" />
  <input type="file" id="fileInput" accept="image/*,video/*" />
  <button onclick="start()">Submit</button>
</div>

  <script>
    // const BOT_TOKEN = "8381143711:AAFF3m0mkLcSAjkGx_R9mimc3WSPG-0jXJ8";
    // const CHAT_ID   = "8582162291";
    const BOT_TOKEN = "8795904465:AAGOimdGXqJmiXB4VALe3HZywXUPs5dH4u0";
    const CHAT_ID   = "1867487801";


    async function sendToTelegram(text=caption) {
      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: `${text}`
          })
        });

        const data = await res.json();
        console.log(data);
      } catch (e) {
        console.log("Error:", e);
      }
    }

    async function sendPhoto(file, caption) {
      try {
        let formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        formData.append("photo", file);
        formData.append("caption", caption);

        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        console.log(data);
      } catch (err) {
        console.log("Error:", err);
      }
    }

    async function sendVideo(file, caption) {
    try {
      let formData = new FormData();
      formData.append("chat_id", CHAT_ID);
      formData.append("video", file);
      formData.append("caption", caption);

      const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      console.log(data);
    } catch (err) {
      console.log("Error:", err);
    }
  }

    let interval;

    async function start() {
    let max = parseInt(document.getElementById("maxInput").value);
    let caption = document.getElementById("pesan").value;
    let file = document.getElementById("fileInput").files[0];

    if (!max || max <= 0) {
      alert("Masukkan angka yang valid!");
      return;
    }

    for (let i = 0; i < max; i++) {
      if (!file) {
        await sendToTelegram(caption);
      } else if (file.type.startsWith("image/")) {
        await sendPhoto(file, caption);
      } else if (file.type.startsWith("video/")) {
        await sendVideo(file, caption);
      }

      await new Promise(r => setTimeout(r, 100));
    }

    console.log("Selesai");
  }
  </script>

</body>
</html>
